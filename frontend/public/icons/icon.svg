<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <rect x="56" y="56" width="400" height="400" rx="80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- K letter -->
  <text x="256" y="320" font-family="SF Mono, Monaco, monospace" font-size="240" font-weight="700" fill="url(#accent)" text-anchor="middle">K</text>
  <!-- Signal dots (remote indicator) -->
  <circle cx="380" cy="130" r="12" fill="#22c55e"/>
  <circle cx="380" cy="130" r="20" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <circle cx="380" cy="130" r="30" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
</svg>
